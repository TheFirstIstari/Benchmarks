# ============================================================================
# Rust Benchmarks
# ============================================================================

[tasks.rust-run]
depends = ["rust-matrix", "rust-allocator", "rust-string", "rust-sort", "rust-concurrency", "rust-hash", "rust-regex", "rust-json", "rust-fileio", "rust-math", "rust-network", "rust-crypto", "rust-ml"]

[tasks.rust-compile]
run = "cargo build --release --manifest-path Rust/Cargo.toml"

[tasks.rust-matrix]
run = "Rust/target/release/matrix"

[tasks.rust-allocator]
run = "Rust/target/release/allocator"

[tasks.rust-string]
run = "Rust/target/release/string"

[tasks.rust-sort]
run = "Rust/target/release/sort"

[tasks.rust-concurrency]
run = "Rust/target/release/concurrency"

[tasks.rust-hash]
run = "Rust/target/release/hash"

[tasks.rust-regex]
run = "Rust/target/release/regex"

[tasks.rust-json]
run = "Rust/target/release/json"

[tasks.rust-fileio]
run = "Rust/target/release/fileio"

[tasks.rust-math]
run = "Rust/target/release/math"

[tasks.rust-network]
run = "Rust/target/release/network"

[tasks.rust-crypto]
run = "Rust/target/release/crypto"

[tasks.rust-ml]
run = "Rust/target/release/ml"

# ============================================================================
# Carbon Benchmarks (experimental)
# ============================================================================

[tasks.carbon-all]
run = "echo 'Carbon benchmarks TBD - needs carbon compiler'"

# ============================================================================
# Tools
# ============================================================================

[tasks.tools-build]
run = "cargo build --release --manifest-path tools/Cargo.toml"

[tasks.monitor]
depends = ["tools-build"]
run = "tools/target/release/monitor"

[tasks.store]
run = "tools/target/release/store list"

[tasks.store-show]
run = "tools/target/release/store show"

[tasks.runner]
depends = ["tools-build", "rust-compile"]
run = "tools/target/release/runner"

[tasks.runner-matrix]
depends = ["tools-build", "rust-compile"]
run = "tools/target/release/runner --categories matrix"

[tasks.runner-sort]
depends = ["tools-build", "rust-compile"]
run = "tools/target/release/runner --categories sort"

# ============================================================================
# Utility
# ============================================================================

[tasks.clean]
run = ["rm -rf benchmarks/*", "rm -rf Rust/target/release"]

[tasks.clean-all]
depends = ["clean"]
run = "rm -rf ~/.local/share/benchmarks"

[tasks.benchmarks]
run = "mkdir -p benchmarks"
