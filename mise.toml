# ============================================================================
# C Benchmarks
# ============================================================================

[tasks.c-run]
depends = ["c-matrix", "c-allocator", "c-string", "c-sort", "c-concurrency", "c-hash", "c-regex", "c-network", "c-crypto", "c-ml"]

[tasks.c-compile]
depends = ["c-matrix-compile", "c-allocator-compile", "c-string-compile", "c-sort-compile", "c-concurrency-compile", "c-hash-compile", "c-regex-compile", "c-network-compile", "c-crypto-compile", "c-ml-compile"]

[tasks.c-matrix-compile]
run = "cc C/matrix.c -O3 -ffast-math -march=native -o benchmarks/c_matrix -lm"

[tasks.c-matrix]
run = "./benchmarks/c_matrix"

[tasks.c-allocator-compile]
run = "cc C/allocator.c -O3 -ffast-math -march=native -o benchmarks/c_allocator -lm"

[tasks.c-allocator]
run = "./benchmarks/c_allocator"

[tasks.c-string-compile]
