[tools]
python = "3.13.2"
rust = "stable"
dotnet = "9.0.203"

[settings]
python.uv_venv_auto = true

[task_config]
dir = "/Users/frobinson/Documents/Obsidian Vault/Programming/SideProjects/Benchmarks"

[tasks.install]
run = "mise install"

[tasks.default]
run = "mise tasks"

[tasks.compile]
depends = ["compile-all"]

# ============================================================================
# Compile All (run these before benchmarking)
# ============================================================================

[tasks.compile-all]
depends = ["c-compile", "cpp-compile", "java-compile", "rust-compile"]

# ============================================================================
# Run All Benchmarks
# ============================================================================

[tasks.all]
depends = ["compile-all", "run-all-benchmarks"]

[tasks.run-all-benchmarks]
depends = ["c-run", "cpp-run", "python-all", "java-run", "rust-run"]

