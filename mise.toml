# ============================================================================
# Java Benchmarks
# ============================================================================

[tasks.java-run]
depends = ["java-matrix", "java-string", "java-sort", "java-concurrency", "java-hash", "java-regex", "java-json", "java-fileio", "java-math", "java-crypto"]

[tasks.java-compile]
run = ["mkdir -p benchmarks/java", "/opt/homebrew/opt/openjdk/bin/javac -d benchmarks/java Java/MatrixBench.java Java/StringBench.java Java/SortBench.java Java/ConcurrencyBench.java Java/HashBench.java Java/RegexBench.java Java/JsonBench.java Java/FileIOBench.java Java/MathBench.java"]

[tasks.java-matrix]
run = "/opt/homebrew/opt/openjdk/bin/java -cp benchmarks/java MatrixBench"

[tasks.java-string]
run = "/opt/homebrew/opt/openjdk/bin/java -cp benchmarks/java StringBench"

[tasks.java-sort]
run = "/opt/homebrew/opt/openjdk/bin/java -cp benchmarks/java SortBench"

[tasks.java-concurrency]
run = "/opt/homebrew/opt/openjdk/bin/java -cp benchmarks/java ConcurrencyBench"

[tasks.java-hash]
run = "/opt/homebrew/opt/openjdk/bin/java -cp benchmarks/java HashBench"

[tasks.java-regex]
